</button>

  <div class="hb-track-indicator" id="hb-track-indicator">

  </div>

  <button class="hb-music-close" id="hb-music-close" type="button" aria-label="关闭">×</button>

<div class="hb-music-body">

  <!-- 曲目指示器 -->

  <!-- iframe 容器，同一时间只显示一个 -->
  <div class="hb-player-wrap" id="hb-player-wrap">
    <iframe data-src="https://i.y.qq.com/n2/m/outchain/player/index.html?songid=563330183&songtype=0"
      frameborder="no" allow="autoplay"></iframe>
    <iframe data-src="https://i.y.qq.com/n2/m/outchain/player/index.html?songid=439583203&songtype=0"
      frameborder="no" allow="autoplay"></iframe>
    <iframe data-src="https://i.y.qq.com/n2/m/outchain/player/index.html?songid=318731687&songtype=0"
      frameborder="no" allow="autoplay"></iframe>
      

    <!-- B站曲目：将 bvid 替换为实际 BV 号，可添加多个-->

  <!-- 上一首 / 下一首 -->
  <div class="hb-nav-row">
    <button class="hb-nav-btn" id="hb-prev" type="button">‹ Pre</button>
    <button class="hb-nav-btn" id="hb-next" type="button">Next ›</button>
  </div>

</div>

</div>

<script>
  (function(){
    var fab = document.getElementById('hb-music-fab');
    var drawer = document.getElementById('hb-music-drawer');
    var closeBtn = document.getElementById('hb-music-close');
    if (!fab || !drawer || !closeBtn) return;
  
    function openDrawer() { drawer.classList.add('is-open'); fab.setAttribute('aria-expanded','true'); }
    function closeDrawer() { drawer.classList.remove('is-open'); fab.setAttribute('aria-expanded','false'); }
    fab.addEventListener('click', function(){ drawer.classList.contains('is-open') ? closeDrawer() : openDrawer(); });
    closeBtn.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDrawer(); });
  
    // 顺序播放逻辑
    var frames = Array.from(document.querySelectorAll('#hb-player-wrap iframe'));
    var label = document.getElementById('hb-track-label');
    var current = 0;
  
    function showTrack(idx) {
      frames.forEach(function(f, i) {
        if (i === idx) {
          if (!f.src) f.src = f.getAttribute('data-src'); // 懒加载
          f.classList.add('active');
        } else {
          f.classList.remove('active');
        }
      });
      // 切换 B站纯音频模式
      var isBilibili = frames[idx].getAttribute('data-type') === 'bilibili';
      document.getElementById('hb-player-wrap').classList.toggle('bilibili-mode', isBilibili);
      label.textContent = (idx + 1) + ' / ' + frames.length;
      current = idx;
    }
  
    document.getElementById('hb-prev').addEventListener('click', function(){
      showTrack((current - 1 + frames.length) % frames.length);
    });
    document.getElementById('hb-next').addEventListener('click', function(){
      showTrack((current + 1) % frames.length);
    });
  
    showTrack(0); // 默认加载第一首
  })();
  </script>
