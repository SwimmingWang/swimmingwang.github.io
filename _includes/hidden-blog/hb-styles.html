<style>

    border: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: rgba(0,0,0,0.62);

    background: rgba(15,23,42,0.02);

    outline: none;

    align-items: center;
    gap: 0.5rem;

    gap: 8px;                    /* 两首歌之间更紧凑 */
  }
  
  .hb-music-body iframe{
    width: 100%;
    height: 86px;                /* QQ 外链常见 86~110；你想更紧凑就降 */
    border: 0;
    border-radius: 10px;         /* 可选：更像卡片 */

  }

  }
  
  @media (max-width: 600px){

      margin-top: 2.5rem;

  }
