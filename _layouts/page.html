---
layout: default
---

<div class="page-wrap">
  <article class="post-card">
    <header class="post-header">
      {% assign display_date = page.last_modified_at | default: page.date %}
      {% if display_date %}
      <div class="post-meta">
        {{ display_date | date: "%Y-%m-%d" }}
      </div>
      {% endif %}
      {% if page.title %}
      <h1 class="post-title">
        {{ page.title }}
      </h1>
      {% endif %}
    </header>

    <div class="post-body">
      {{ content }}
    </div>
  </article>
</div>
